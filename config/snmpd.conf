###############################################################################
#
# snmpd.conf - Configuration file for the SNMP simulator agent
#
# This file mimics a standard net-snmp snmpd.conf configuration
#
###############################################################################

###############################################################################
# AGENT BEHAVIOR
###############################################################################

# Listen for connections on UDP port 11161 from all interfaces
agentAddress udp:0.0.0.0:11161

###############################################################################
# ACCESS CONTROL
###############################################################################

# Read-only access with community string "public"
# This allows SNMP GET, GETNEXT, and GETBULK operations
rocommunity public default

# Read-write access with community string "private"
# This allows SNMP GET, GETNEXT, GETBULK, and SET operations
rwcommunity private default

###############################################################################
# SYSTEM INFORMATION
###############################################################################

# System location
sysLocation    Server Room

# System contact
sysContact     Admin <admin@example.com>

# System name
sysName        snmp-simulator

# System description
sysDescr       Simple Python SNMP Agent

###############################################################################
# LOGGING
###############################################################################

# Log level: 0=emergency, 1=alert, 2=critical, 3=error, 4=warning, 5=notice, 6=info, 7=debug
# Default is to log to syslog, but we handle logging in our Python application

###############################################################################
# MIBS
###############################################################################

# MIBs supported by this agent:
# - SNMPv2-MIB (System group: sysDescr, sysContact, sysLocation, etc.)
# - IF-MIB (Network interfaces)
# - HOST-RESOURCES-MIB (Host resources: CPU, memory, storage, processes)
# - HOST-RESOURCES-TYPES (Host resource types)
# - CISCO-ALARM-MIB (Cisco alarm management)
# - TEST-ENUM-MIB (Test MIB with enumerations)

###############################################################################
# NOTES
###############################################################################

# This is a simulated SNMP agent for testing and development purposes.
# 
# Community Strings:
#   - public:  Read-only access (GET, GETNEXT, GETBULK)
#   - private: Read-write access (GET, GETNEXT, GETBULK, SET)
#
# Writable OIDs (with "private" community):
#   - sysContact.0 (1.3.6.1.2.1.1.4.0)
#   - sysLocation.0 (1.3.6.1.2.1.1.6.0)
#   - sysName.0 (1.3.6.1.2.1.1.5.0)
#
# Example commands:
#   snmpget -c public -v2c localhost:11161 sysContact.0
#   snmpset -c private -v2c localhost:11161 sysContact.0 s "me@example.com"
#   snmpwalk -c public -v2c localhost:11161 system
#
###############################################################################


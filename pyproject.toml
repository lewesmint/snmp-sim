[tool.mypy]
python_version = "3.10"
strict = true
warn_unused_ignores = true
warn_return_any = true
warn_unreachable = true
show_error_codes = true
ignore_missing_imports = false

exclude = '(^|/)(retired|compiled-mibs-test|compiled-mibs|minimal-for-reference|manual-tests|logs|tests)/'

[[tool.mypy.overrides]]
module = ["pysnmp", "pysnmp.*"]
ignore_missing_imports = true
disable_error_code = ["import-untyped"]

[[tool.mypy.overrides]]
module = ["pysmi", "pysmi.*"]
ignore_missing_imports = true
disable_error_code = ["import-untyped"]

[[tool.mypy.overrides]]
module = ["dynaconf", "dynaconf.*"]
ignore_missing_imports = true
disable_error_code = ["import-untyped"]

[[tool.mypy.overrides]]
module = ["customtkinter", "customtkinter.*"]
ignore_missing_imports = true
disable_error_code = ["import-untyped"]
[tool.coverage.run]
source = ["app", "plugins", "ui"]
branch = true
omit = [
    "tests/**",
    "manual-tests/**",
    "minimal-for-reference/**",
    "compiled-mibs/**",
    "compiled-mibs-test/**",
    "retired/**",
    "logs/**",
    "ui/logs/**",
    "**/.venv/**",
    "**/.pyenv/**",
]

[tool.coverage.report]
skip_empty = true
show_missing = true

[tool.ruff]
target-version = "py310"
line-length = 100
exclude = [
    "tests/**",
    "retired/**",
    "compiled-mibs/**",
    "compiled-mibs-test/**",
    "minimal-for-reference/**",
    "manual-tests/**",
    "logs/**",
    "ui/logs/**",
    "build/**",
    "dist/**",
    "**/.venv/**",
    "**/.pyenv/**",
]

[tool.ruff.format]
quote-style = "double"

[tool.ruff.lint]
select = ["ALL"]
ignore = [
    "D203",  # incompatible with D211
    "D213",  # incompatible with D212
    "COM812",  # conflicts with ruff formatter
    "TC003",  # false positive: logging/Iterator used at runtime with from __future__ import annotations
]

[tool.ruff.lint.mccabe]
max-complexity = 12

[tool.pylint.messages_control]
disable = [
    "broad-exception-caught",
    "import-outside-toplevel",
    "logging-fstring-interpolation",
    "protected-access",
    "raise-missing-from",
    "redefined-outer-name",
    "reimported",
    "unused-variable",
]

[tool.pylint.main]
ignore = ["retired", "compiled-mibs", "compiled-mibs-test", "manual-tests", "tests"]
ignore-paths = [
    "(^|.*/)retired/.*",
    "(^|.*/)compiled-mibs/.*",
    "(^|.*/)compiled-mibs-test/.*",
    "(^|.*/)manual-tests/.*",
    "(^|.*/)tests/.*",
]

[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]
addopts = [
    "--ignore=tests",
    "--ignore=minimal-for-reference",
    "--ignore=compiled-mibs",
    "--ignore=compiled-mibs-test",
    "--ignore=retired",
    "--ignore=manual-tests",
    "--ignore=logs",
    "--ignore=snmp-wrapper"
]
filterwarnings = [
    "ignore::DeprecationWarning",
]

[tool.pyright]
pythonVersion = "3.10"
exclude = [
    "**/node_modules",
    "**/__pycache__",
    "**/.*",
    "**/.venv/**",
    "**/.pyenv/**",
    "tests",
    "compiled-mibs",
    "compiled-mibs-test",
    "retired",
    "minimal-for-reference",
    "manual-tests",
    "logs",
    "ui/logs"
]

[[tool.pyright.executionEnvironments]]
root = "."
pythonVersion = "3.10"
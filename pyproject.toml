[tool.mypy]
python_version = "3.13"
strict = true
warn_unused_ignores = true
warn_unused_configs = true
warn_return_any = true
warn_unreachable = true
show_error_codes = true
ignore_missing_imports = false
mypy_path = ["../pysnmp-type-wrapper", "../pysnmp-type-wrapper/typings"]

# Exclude generated, test, and scratch folders anywhere in the tree
exclude = '(^|/)(retired|compiled-mibs|compiled-mibs-test|minimal_for_reference|manual-tests|logs|tests|snmp_wrapper)($|/)'

# Ignore missing stubs only for selected third party modules that tend to be untyped.
# Add or remove entries here as you encounter them.
[[tool.mypy.overrides]]
module = [
    "customtkinter.*",
    "dynaconf.*",
    "pysnmp.*",
    "pysmi.*",
    "pyasn1.*",
]
ignore_missing_imports = true
disable_error_code = ["import-untyped"]

[[tool.mypy.overrides]]
module = ["minimal_for_reference.*"]
ignore_errors = true

[tool.coverage.run]
source = ["app", "plugins", "ui"]
branch = true
omit = [
    "tests/**",
    "manual-tests/**",
    "minimal_for_reference/**",
    "compiled-mibs/**",
    "compiled-mibs-test/**",
    "retired/**",
    "logs/**",
    "ui/logs/**",
    "snmp_wrapper/**",
    "**/.venv/**",
    "**/.pyenv/**",
]

[tool.coverage.report]
skip_empty = true
show_missing = true

[tool.ruff]
target-version = "py313"
line-length = 100
exclude = [
    "tests/**",
    "retired/**",
    "compiled-mibs/**",
    "compiled-mibs-test/**",
    "minimal_for_reference/**",
    "manual-tests/**",
    "logs/**",
    "ui/logs/**",
    "snmp_wrapper/**",
    "build/**",
    "dist/**",
    "**/.venv/**",
    "**/.pyenv/**",
]

[tool.ruff.format]
quote-style = "double"

[tool.ruff.lint]
select = ["ALL"]
ignore = [
    "D203",    # incompatible with D211
    "D213",    # incompatible with D212
    "COM812",  # conflicts with ruff formatter
    "TC003",   # false positive: some runtime-only typing imports
    "C901",    # legacy complexity hotspots tracked separately
    "PLR0912", # legacy branch-count hotspots tracked separately
    "PLR0913", # legacy argument-count hotspots tracked separately
    "FBT001",  # allow bool-typed args in existing legacy APIs
]

[tool.ruff.lint.per-file-ignores]
"minimal_for_reference/**/*.py" = ["ALL"]

[tool.ruff.lint.mccabe]
max-complexity = 12

[tool.pylint.messages_control]
disable = [
    "C0114",  # missing-module-docstring
    "C0115",  # missing-class-docstring
    "C0116",  # missing-function-docstring
    "W0718",  # broad-exception-caught
    "W0212",  # protected-access
    "W0707",  # raise-missing-from
    "R0903",  # too-few-public-methods
    "R0902",  # too-many-instance-attributes
    "R0911",  # too-many-return-statements
    "R0914",  # too-many-locals
    "R0915",  # too-many-statements
    "R0913",  # too-many-arguments
    "R0917",  # too-many-positional-arguments
    "R1702",  # too-many-nested-blocks
    "R0912",  # too-many-branches
    "R0801",  # duplicate-code
]

[tool.pylint.basic]
method-rgx = "^(?:[a-z_][a-z0-9_]*|prettyPrint)$"

[tool.pylint.main]
ignore = [
    "retired",
    "compiled-mibs",
    "compiled-mibs-test",
    "minimal_for_reference",
    "manual-tests",
    "tests",
    "snmp_wrapper",
    ".venv",
    ".pyenv",
    "venv",
    "build",
    "dist",
    "__pycache__",
    ".mypy_cache",
    ".pytest_cache",
    ".ruff_cache",
    ".tox",
    "site-packages",
]
ignore-paths = [
    "(^|.*/)retired/.*",
    "(^|.*/)compiled-mibs/.*",
    "(^|.*/)compiled-mibs-test/.*",
    "(^|.*/)minimal_for_reference/.*",
    "(^|.*/)manual-tests/.*",
    "(^|.*/)tests/.*",
    "(^|.*/)snmp_wrapper/.*",
    "(^|.*/)\\.venv/.*",
    "(^|.*/)\\.pyenv/.*",
    "(^|.*/)venv/.*",
    "(^|.*/)build/.*",
    "(^|.*/)dist/.*",
    "(^|.*/)__pycache__/.*",
    "(^|.*/)\\.mypy_cache/.*",
    "(^|.*/)\\.pytest_cache/.*",
    "(^|.*/)\\.ruff_cache/.*",
    "(^|.*/)\\.tox/.*",
    "(^|.*/)site-packages/.*",
    "(^|.*/).*\\.egg-info/.*",
]

[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]
addopts = [
    "--ignore=minimal_for_reference",
    "--ignore=compiled-mibs",
    "--ignore=compiled-mibs-test",
    "--ignore=retired",
    "--ignore=manual-tests",
    "--ignore=logs",
    "--ignore=snmp_wrapper",
]
filterwarnings = [
    "ignore::DeprecationWarning",
]

[tool.pyright]
pythonVersion = "3.13"
venvPath = "."
venv = ".venv"
reportMissingTypeStubs = "none"
stubPath = "../pysnmp-type-wrapper/typings"
include = [
    "app",
    "tests",
    "manual-tests",
    "run_ui.py",
    "run_agent_with_rest.py",
    "run_trap_receiver.py",
]
exclude = [
    "**/node_modules",
    "**/__pycache__",
    "**/.*",
    "**/.venv/**",
    "**/.pyenv/**",
    "compiled-mibs",
    "compiled-mibs-test",
    "retired",
    "logs",
    "ui/logs",
    "snmp_wrapper",
]
ignore = [
    "minimal_for_reference",
    "compiled-mibs",
    "compiled-mibs-test",
]

[[tool.pyright.executionEnvironments]]
root = "."
pythonVersion = "3.13"
extraPaths = [".", "app", "../pysnmp-type-wrapper"]